name: Test sysinfo.sh

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-script:
    name: Run on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x script/sysinfo.sh

      - name: Run sysinfo script and capture output
        env:
          TERM: xterm
        run: |
          set -euo pipefail
          ./script/sysinfo.sh | tee sysinfo-output.txt

      - name: Validate expected output sections
        run: |
          set -euo pipefail
          grep -qE "cpu[[:space:]]" sysinfo-output.txt
          grep -qE "memory[[:space:]]" sysinfo-output.txt
          grep -qE "disk[[:space:]]" sysinfo-output.txt
          grep -qE "os[[:space:]]" sysinfo-output.txt
          grep -qE "uptime[[:space:]]" sysinfo-output.txt
          grep -qE "load avg[[:space:]]" sysinfo-output.txt
          grep -qE "virt[[:space:]]" sysinfo-output.txt
          grep -qE "ipv4[[:space:]]" sysinfo-output.txt
          grep -qE "ipv6[[:space:]]" sysinfo-output.txt

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysinfo-output-${{ matrix.os }}
          path: sysinfo-output.txt
          if-no-files-found: error
